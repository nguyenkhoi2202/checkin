<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Attendance App</title>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body { font-family: Arial; padding: 40px; }
    input { width: 100%; padding: 8px; margin-top: 10px; }
    button { width: 100%; padding: 10px; margin-top: 10px; }
    #status { margin-top: 15px; }
  </style>
</head>
<body>

<h2>CheckIn</h2>

<!-- LOGIN FORM -->
<input type="text" id="username" placeholder="Username" />
<input type="password" id="password" placeholder="Password" />

<button onclick="login()">Login</button>

<!-- DATETIME -->
<input type="datetime-local" id="datetime" />

<button onclick="checkin()" disabled>Checkin</button>
<button onclick="checkout()" disabled>Checkout</button>

<p id="status"></p>

<script>
const BASE_URL = "https://in-prod-svc-peopleapp-api.galaxy.one";

let stoken = null;

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function formatDateTime(value) {
  const d = new Date(value);
  const pad = n => n.toString().padStart(2, '0');

  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// LOGIN
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    setStatus("Nhập username/password");
    return;
  }

  setStatus("Đang login...");

  try {
    const res = await axios.post(
      BASE_URL + "/sovico/api/user/login",
      {
        username: username,
        Password: password,
        OS: "2",
        DeviceID: "iPhone 11_Apple_iPhone12,1_26.1_414x896_1764034217068_2644981520",
        Version: "26.2",
        LangID: "VN",
        DeviceName: "iPhone 11",
        DeviceToken: "cz72IkglEk7_noma8gtSRr:APA91bHy96OWqYzBuZ6gRisgRhtxBrUIW05BRWOMTpeJJnUACDtQrMQP1HACJ0k_IleL30u67m1N1VaKh_9kQ3bM4HHreXdMHwGdCyVrbIhNjkeFSuT_GIc",
        company: "HDBANK",
        build: "10"
      },
      {
        headers: {
          "Content-Type": "application/json",
          "version-app": "PNJ_20210105_V1",
          "User-Agent": "People/50 CFNetwork/3860.300.31 Darwin/25.2.0",
          "Host": "in-prod-svc-peopleapp-api.galaxy.one",
        }
      }
    );

    stoken = res.data.message;

    setStatus("Login OK");
    document.getElementById("btnCheckin").disabled = false;
    document.getElementById("btnCheckout").disabled = false;

  } catch (err) {
    console.error(err);
    setStatus("Login fail: " + (err.response?.data || err.message));
  }
}

// ATTENDANCE
async function callAttendance(type) {
  if (!stoken) {
    setStatus("Chưa login");
    return;
  }

  const raw = document.getElementById("datetime").value;
  if (!raw) {
    setStatus("Chọn datetime");
    return;
  }

  const p4 = formatDateTime(raw);

  try {
    const res = await axios.post(
      BASE_URL + "/sovico/api/ticket/attendance/wifi/capture",
      {
        Stoken: stoken,
        LangID: "VN",
        AppVersion: "PNJ_20210105_V1",
        OS: "2",
        DataHeader: {
          P0: "f7500ae9aa14a8f5555280058c42c7d8",
          P1: type,
          P2: "B621C457-339A-480C-9DCF-40407A51D7C6",
          P3: "9a:2a:6f:a4:8f:49",
          P4: p4,
          P5: "GIH_8F",
          P6: ""
        },
        company: "HDBANK"
      },
      {
        headers: {
          "Content-Type": "application/json",
          "version-app": "PNJ_20210105_V1",
          "deviceid": "iPhone 11_Apple_iPhone12,1_26.1_414x896_1764034217068_2644981520",
          "Host" : "in-prod-svc-peopleapp-api.galaxy.one",
          "version-app-redirect": "2.8",
          "User-Agent": "People/50 CFNetwork/3860.300.31 Darwin/25.2.0"
        }
      }
    );

    setStatus(type === "i" ? "Checkin OK at " + p4 : "Checkout OK at " + p4);

  } catch (err) {
    console.error(err);
    setStatus("Fail: " + (err.response?.data || err.message));
  }
}

function checkin() {
  callAttendance("i");
}

function checkout() {
  callAttendance("o");
}
</script>

</body>
</html>
